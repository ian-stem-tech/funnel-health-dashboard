name: Refresh dashboard data

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run refresh script
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_SERVER_PREFIX: ${{ vars.MAILCHIMP_SERVER_PREFIX || 'us4' }}
          IG_HANDLE: ${{ vars.IG_HANDLE || 'stemplayer' }}
          TIKTOK_HANDLE: ${{ vars.TIKTOK_HANDLE || 'stemplayer' }}
        run: node scripts/refresh-snapshot.mjs

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/snapshot.json public/data/mailchimp-discovery.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to snapshot."
          else
            git commit -m "chore(data): refresh snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
